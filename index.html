<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProTrade Exchange</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-weight:bold;
color:#22d3ee;
}

.balance-box{
background:#1e293b;
padding:6px 12px;
border-radius:8px;
}

/* MAIN */

.main{
padding:15px;
padding-bottom:95px;
}

.panel{
display:none;
}

.panel.active{
display:block;
}

/* WIDGET */

.widget{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

input{
padding:8px;
margin:6px 0;
border:none;
border-radius:6px;
width:90%;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #1e293b;
}

/* WALLET ADDRESS */

.deposit-address{
background:#020617;
padding:10px;
border-radius:6px;
font-size:12px;
margin:10px 0;
word-break:break-all;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #1e293b;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:999;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:center;
width:300px;
}

.close-btn{
margin-top:10px;
display:block;
cursor:pointer;
color:#38bdf8;
}

/* NOTIFICATION */

.notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px 18px;
border-radius:6px;
display:none;
z-index:2000;
}

</style>
</head>

<body>

<div id="notify" class="notify">Notice</div>

<header>

<div class="logo">ProTrade</div>

<div>BTC $<span id="btc-price">Loading</span></div>

<div class="balance-box">
$<span id="balance">0</span>
</div>

<div>
<button id="loginBtn" onclick="showLogin()">Login</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
</div>

</header>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="panel active">

<div class="widget">

<h3>Quick Trade</h3>

<button onclick="requireAuth();buy()">Buy BTC</button>
<button onclick="requireAuth();sell()">Sell BTC</button>

</div>

<div class="widget">

<h3>BTC Chart</h3>

<div id="chart"></div>

</div>

</div>

<!-- MARKET -->

<div id="market" class="panel">

<div class="widget">

<h3>Market</h3>

<table>

<tr>
<th>Pair</th>
<th>Price</th>
</tr>

<tr>
<td>BTC/USDT</td>
<td id="btcMarket">Loading</td>
</tr>

</table>

</div>

</div>

<!-- PORTFOLIO -->

<div id="portfolio" class="panel">

<div class="widget">

<h3>Portfolio</h3>

<table>

<tr>
<th>Asset</th>
<th>Amount</th>
<th>Value</th>
</tr>

<tr>
<td>BTC</td>
<td id="btcAmount">0</td>
<td id="btcValue">$0</td>
</tr>

</table>

</div>

</div>

<!-- WALLET -->

<div id="wallet" class="panel">

<div class="widget">

<h3>Deposit BTC</h3>

<div class="deposit-address" id="depositAddress">
bc1qjqcm9ngrvm570x6jzxk8hyqaz94g5l3zxngkcf
</div>

<button onclick="copyAddress()">Copy Address</button>

<button onclick="startDeposit()">Deposit</button>

</div>

<div class="widget">

<h3>Withdraw BTC submitted</h3>

<input id="withdrawAddress" placeholder="Recipient BTC Address">

<input id="withdrawAmount" placeholder="Amount in BTC">

<button onclick="withdraw()">Withdraw</button>

</div>

<ul id="walletLog"></ul>

</div>

</div>

<!-- LOGIN MODAL -->

<div class="modal" id="loginModal">

<div class="card">

<h3>Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<span class="close-btn" onclick="closeLogin()">Close</span>

</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<button onclick="showPanel('dashboard')">
🏠
<div>Home</div>
</button>

<button onclick="showPanel('market')">
📈
<div>Market</div>
</button>

<button onclick="showPanel('portfolio')">
💼
<div>Portfolio</div>
</button>

<button onclick="showPanel('wallet')">
👛
<div>Wallet</div>
</button>

</div>

<script>

let balance=0
let btc=0
let btcPrice=0

/* LOAD SAVED BALANCE */

if(localStorage.getItem("balance")){
balance=parseFloat(localStorage.getItem("balance"))
}

document.getElementById("balance").innerText=balance.toFixed(2)

/* PANEL SWITCH */

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* LOGIN */

function showLogin(){
loginModal.style.display="flex"
}

function closeLogin(){
loginModal.style.display="none"
}

function login(){

let u=username.value.trim()
let p=password.value.trim()

if(!u||!p){
alert("Enter login details")
return
}

localStorage.setItem("loggedIn","true")
localStorage.setItem("user",u)

loginBtn.style.display="none"
logoutBtn.style.display="inline-block"

closeLogin()

showNotify("Welcome "+u)

}

function logout(){

localStorage.removeItem("loggedIn")

loginBtn.style.display="inline-block"
logoutBtn.style.display="none"

showNotify("Logged out")

}

/* AUTH CHECK */

function requireAuth(){

if(localStorage.getItem("loggedIn")!=="true"){
showLogin()
throw "login required"
}

}

/* BTC PRICE */

async function fetchBTC(){

let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT")

let d=await r.json()

btcPrice=parseFloat(d.price)

document.getElementById("btc-price").innerText=btcPrice.toFixed(2)

btcMarket.innerText=btcPrice.toFixed(2)

updatePortfolio()

}

setInterval(fetchBTC,5000)
fetchBTC()

/* TRADE */

function buy(){

if(balance<100){
showNotify("Not enough balance")
return
}

let amount=100/btcPrice

btc+=amount
balance-=100

update()

}

function sell(){

if(btc<=0){
showNotify("No BTC to sell")
return
}

balance+=btc*btcPrice
btc=0

update()

}

/* WITHDRAW DEMO */

function withdraw(){

let addr=document.getElementById("withdrawAddress").value
let amt=parseFloat(document.getElementById("withdrawAmount").value)

if(!addr||!amt){
showNotify("Enter address and amount")
return
}

walletLog.innerHTML="<li>Withdrawal requested: "+amt+" BTC → "+addr+"</li>"+walletLog.innerHTML

showNotify("Withdrawal request submitted")

}

/* UPDATE */

function update(){

localStorage.setItem("balance",balance)

document.getElementById("balance").innerText=balance.toFixed(2)

updatePortfolio()

}

function updatePortfolio(){

btcAmount.innerText=btc.toFixed(4)
btcValue.innerText="$"+(btc*btcPrice).toFixed(2)

}

/* WALLET */

function copyAddress(){

let text=document.getElementById("depositAddress").innerText

navigator.clipboard.writeText(text)

showNotify("Wallet address copied")

}

function startDeposit(){

copyAddress()

showNotify("Opening deposit page")

setTimeout(()=>{
window.open("https://exchange.mercuryo.io/","_blank")
},1200)

}

/* NOTIFICATION */

function showNotify(msg){

let n=document.getElementById("notify")

n.innerText=msg
n.style.display="block"

setTimeout(()=>{
n.style.display="none"
},2000)

}

/* CHART */

new TradingView.widget({
container_id:"chart",
width:"100%",
height:350,
symbol:"BINANCE:BTCUSDT",
interval:"60",
theme:"dark"
})

</script>

</body>
  </html>
